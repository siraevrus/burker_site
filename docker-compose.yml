services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      # Docker runtime внутри контейнера, не production PM2 путь сервера.
      - DATABASE_URL=file:./prisma/dev.db
      - PORT=3000
      - MAILOPOST_API_URL=https://api.mailopost.ru/v1
      - MAILOPOST_API_TOKEN=0e214eeceb83783a7ed4dc025a0175b1
      - MAILOPOST_FROM_EMAIL=noreply@burker-watches.ru
      - MAILOPOST_FROM_NAME=Мира Брендс | Буркер
      - ADMIN_EMAIL=info@kondratov.online
      - CRON_SECRET=${CRON_SECRET:-your-secret-key-here}
    volumes:
      # Docker volume для локальной/container SQLite базы и загруженных файлов
      - ./prisma/dev.db:/app/prisma/dev.db
      - ./public/promo:/app/public/promo
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Cron-сервис: курсы валют (каждые 4ч) + импорт товаров (каждые 8ч)
  cron:
    image: curlimages/curl:latest
    environment:
      - CRON_SECRET=${CRON_SECRET:-your-secret-key-here}
    command: >
      sh -c 'echo "Starting cron jobs...";
      (while true; do
        echo "[$(date)] Updating exchange rates...";
        curl -s -H "X-Cron-Secret: $${CRON_SECRET}" http://app:3000/api/cron/update-rates;
        echo "";
        sleep 14400;
      done) &
      (while true; do
        echo "[$(date)] Running product import...";
        curl -s -H "X-Cron-Secret: $${CRON_SECRET}" "http://app:3000/api/cron/import";
        echo "";
        sleep 28800;
      done) &
      wait'
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped
