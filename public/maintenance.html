<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Сайт обновляется | Mira Brands | Burker</title>
  <meta name="robots" content="noindex, nofollow">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background-color: #FCFAF8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      color: #171717;
    }
    .container {
      text-align: center;
      max-width: 480px;
    }
    .logo {
      font-size: 1.5rem;
      font-weight: 500;
      letter-spacing: 0.05em;
      margin-bottom: 32px;
      color: #171717;
    }
    h1 {
      font-size: 1.75rem;
      font-weight: 500;
      margin-bottom: 16px;
      line-height: 1.4;
    }
    p {
      font-size: 1rem;
      line-height: 1.6;
      color: #525252;
      margin-bottom: 24px;
    }
    .divider {
      width: 35px;
      height: 3px;
      background-color: #CAC8C6;
      margin: 0 auto 24px;
    }
    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid #E5E5E5;
      border-top-color: #171717;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 32px;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="container">
    <p class="logo">Mira Brands | Burker</p>
    <div class="divider"></div>
    <div class="spinner" aria-hidden="true"></div>
    <h1>Сайт обновляется</h1>
    <p>Ведутся технические работы. Пожалуйста, обновите страницу через&nbsp;минуту.</p>
  </div>
</body>
</html>
